# Single source of truth for every parameter. Edit values here, not in code.

seed: 42

# Dataset
data_root: ./data/raw/2nd_test
channel: 0                    # 0 = bearing 1 of Test 2

# Output
results_dir: ./results

# Visualisation
figure:
  duration_ms: 50.0
  dpi: 300

# --- Placeholders for later phases (schema is stable) ---

segmentation:
  window: 2048                # ~100 ms at 20 kHz
  stride: 2048                # = window means no overlap

entropy:
  m: 4
  delta: 1.0e-3
  gamma: 1.0e-1
  adaptive_thresholds: true   # multiply delta/gamma by signal std
  use_numba: false            # Phase 12

sweep:
  sampling_stride: 4          # use every Nth file

cusum:
  healthy_fraction: 0.25
  k: 0.5
  h: 5.0

parallel:
  enabled: false
  workers: 4
